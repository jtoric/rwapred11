# =============================================================
# alembic.ini -- Alembic konfiguracija
# =============================================================
# Alembic je "version control za bazu podataka".
# Svaka promjena modela -> nova migracija -> alembic upgrade head.
#
# NAPOMENA: sqlalchemy.url je PRAZAN jer ga citamo iz Settings
# (app.core.config) u env.py. Tako izbjegavamo dupliranje
# connection stringa i slucajno commitanje credentiala.
#
# Osnovne naredbe:
#   alembic upgrade head          -- primijeni sve migracije
#   alembic downgrade -1          -- rollback zadnje migracije
#   alembic revision --autogenerate -m "opis"  -- generiraj novu
#   alembic history               -- prikazi povijest migracija
# =============================================================

[alembic]
# Putanja do direktorija s migracijom (relativno od api/).
script_location = alembic

# sqlalchemy.url je prazan — env.py ga preuzima iz app.core.config.
# NIKAD ne stavljaj pravi connection string ovdje (sigurnost!).
sqlalchemy.url =

# Template za generiranje novih migracija.
file_template = %%(rev)s_%%(slug)s

# Timezone za revision timestamp.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

